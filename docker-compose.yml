# Full stack: PostgreSQL + Spring Boot backend + nginx-served React frontend.
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up --build
# Frontend:  http://localhost:8081
# Backend:   http://localhost:8080  (proxied via the frontend at /api and /ws)

services:
  db:
    image: postgres:16-alpine
    container_name: message-mesh-db
    environment:
      POSTGRES_DB: ${DB_NAME:-message_mesh_db}
      POSTGRES_USER: ${DB_USERNAME:-message_mesh}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-message_mesh}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-message_mesh} -d ${DB_NAME:-message_mesh_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - message-mesh

  backend:
    build:
      context: ./message-mesh-svc
    container_name: message-mesh-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-message_mesh_db}
      DB_USERNAME: ${DB_USERNAME:-message_mesh}
      DB_PASSWORD: ${DB_PASSWORD:-message_mesh}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-in-prod-please-use-a-long-random-secret-key-32b+}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-86400000}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-alice}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8081}
    ports:
      - "8080:8080"
    networks:
      - message-mesh

  frontend:
    build:
      context: ./message-mesh-ui
    container_name: message-mesh-frontend
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "8081:80"
    networks:
      - message-mesh

volumes:
  db-data:

networks:
  message-mesh:
    driver: bridge
