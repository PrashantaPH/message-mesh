name: Message Mesh UI CD

on:
  push:
    branches: [ main ]
    paths:
      - 'message-mesh-ui/**'
      - '.github/workflows/message-mesh-ui-cd.yml'
  workflow_dispatch:

# Permissions required for GitHub Pages deployment via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; skip runs queued in between.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: message-mesh-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: message-mesh-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Repo is served at https://<user>.github.io/message-mesh/, so the
      # bundle must be built with that sub-path as its base.
      - name: Build
        run: npm run build -- --base=/message-mesh/

      # GitHub Pages has no server-side rewrites; a 404 fallback that serves
      # index.html lets the SPA (BrowserRouter) handle deep links / refreshes.
      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: message-mesh-ui/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
