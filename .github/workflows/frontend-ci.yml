name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'message-mesh-ui/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'message-mesh-ui/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    name: Lint & Build (Vite / Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: message-mesh-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: message-mesh-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: message-mesh-ui/dist/
          if-no-files-found: ignore
