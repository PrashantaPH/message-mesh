name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'message-mesh-svc/**'
      - '.github/workflows/message-mesh-svc-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'message-mesh-svc/**'
      - '.github/workflows/message-mesh-svc-ci.yml'

jobs:
  build:
    name: Build & Test (Maven / Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: message-mesh-svc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        run: mvn -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: message-mesh-svc/target/site/jacoco/
          if-no-files-found: ignore

      - name: Upload Surefire test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: message-mesh-svc/target/surefire-reports/
          if-no-files-found: ignore
