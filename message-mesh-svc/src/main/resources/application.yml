spring:
  application:
    name: message-mesh-svc
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json

app:
  jwt:
    # Dev-only default; MUST be overridden in production via APP_JWT_SECRET.
    secret: ${APP_JWT_SECRET:change-me-in-prod-please-use-a-long-random-secret-key-32b+}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  admin:
    # Existing username promoted to ADMIN on startup when no administrator exists.
    # Set to empty to disable auto-promotion.
    bootstrap-username: ${APP_ADMIN_USERNAME:alice}
  cors:
    # Comma-separated list of allowed origins. "*" permits any origin (dev only).
    # Tighten in production via APP_CORS_ALLOWED_ORIGINS.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:*}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    auth:
      capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:10}
      refill-per-minute: ${APP_RATE_LIMIT_AUTH_REFILL:10}
    admin:
      capacity: ${APP_RATE_LIMIT_ADMIN_CAPACITY:120}
      refill-per-minute: ${APP_RATE_LIMIT_ADMIN_REFILL:120}

