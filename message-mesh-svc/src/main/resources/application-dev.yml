# Development profile: embedded H2 file database, verbose logging, H2 console.
spring:
  datasource:
    url: jdbc:h2:file:./data/chatdb;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    root: INFO
    com.message.mesh: DEBUG
    org.springframework.web.socket: INFO
    org.hibernate.SQL: DEBUG
