{
  "openapi": "3.0.1",
  "info": {
    "title": "Message Mesh API",
    "description": "Scalable real-time chat backend.\n\n## Overview\nMessage Mesh combines a stateless REST API for resource management with a\nSTOMP-over-WebSocket channel for live messaging, typing indicators, delivery\nacknowledgements, and presence updates.\n\n## Authentication\n1. Register via `POST /api/auth/register` or sign in via `POST /api/auth/login`.\n2. Both return a JWT in the `token` field.\n3. Send it as `Authorization: Bearer \u003Ctoken\u003E` on every protected REST request,\n   and as a connect header on the `/ws` WebSocket handshake.\n4. In Swagger UI, click **Authorize** and paste the raw token (no `Bearer ` prefix).\n\n## Roles\nEvery user has a platform role (`USER` or `ADMIN`). The `/api/admin/**` endpoints\nrequire the `ADMIN` role; other endpoints only require a valid JWT. Sensitive\nendpoints (auth, admin) are rate limited.\n\n## Real-time channel (not covered by this spec)\nSTOMP destinations are handled over WebSocket and therefore are not part of the\nOpenAPI document. Connect at `/ws` (SockJS) with the JWT as a connect header.\n\nClient → server (`/app` prefix):\n- `SEND /app/chat.send` — publish a message (supports `parentId` for threaded replies)\n- `SEND /app/chat.ack` — acknowledge delivery/read of a message\n- `SEND /app/chat.typing` — broadcast typing state\n\nServer → client (broadcast topics):\n- `SUBSCRIBE /topic/conv.{id}` — receive messages for a conversation (new, edited, deleted, reactions)\n- `SUBSCRIBE /topic/conv.{id}.typing` — receive typing indicators for a conversation\n- `SUBSCRIBE /topic/conv.{id}.meta` — receive conversation meta events (rename, member add/remove, role change, delete)\n- `SUBSCRIBE /topic/presence` — receive presence (online/offline) updates\n\nServer → client (user-scoped queues, `/user` prefix):\n- `SUBSCRIBE /user/queue/ack` — receive personal delivery/read acknowledgements\n- `SUBSCRIBE /user/queue/conversations` — receive newly created conversations\n",
    "contact": {
      "name": "Message Mesh Platform Team",
      "url": "https://message-mesh.dev.com",
      "email": "platform@message-mesh.dev.com"
    },
    "license": {
      "name": "Apache License 2.0",
      "url": "https://www.apache.org/licenses/LICENSE-2.0"
    },
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "http://localhost:8080",
      "description": "Local development server"
    },
    {
      "url": "https://api.message-mesh.prod.com",
      "description": "Production server"
    }
  ],
  "security": [
    {
      "bearerAuth": []
    }
  ],
  "tags": [
    {
      "name": "Admin",
      "description": "Administrative endpoints (require the ADMIN role): user management (create, role/status changes, password reset, session revocation, delete), conversation and message moderation (soft-delete/restore), platform statistics, and the audit trail."
    },
    {
      "name": "Authentication",
      "description": "Public endpoints for account registration and login. Successful calls return a signed JWT used to authorize every other request and the STOMP WebSocket handshake."
    },
    {
      "name": "Users",
      "description": "Look up and update the authenticated profile (display name, password, account deletion), discover other users, and query real-time presence (online roster)."
    },
    {
      "name": "Conversations",
      "description": "Create and list conversations, fetch message history with sequence-based pagination, list conversation members (roster), and acknowledge read receipts."
    },
    {
      "name": "Messages",
      "description": "Per-message actions: edit or soft-delete a message, and add or remove emoji reactions. Updated messages are re-broadcast to the conversation over STOMP."
    }
  ],
  "paths": {
    "/api/users/me/password": {
      "post": {
        "tags": [
          "Users"
        ],
        "summary": "Change the authenticated user's password",
        "description": "Verifies the current password, applies the new one, and returns a freshly issued JWT so the caller stays signed in on this device while other sessions are invalidated.",
        "operationId": "changePassword",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ChangePasswordRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Password changed; new token returned",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthResponse"
                }
              }
            }
          },
          "400": {
            "description": "Current password incorrect or validation failed",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      }
    },
    "/api/messages/{id}/reactions": {
      "post": {
        "tags": [
          "Messages"
        ],
        "summary": "Add a reaction",
        "description": "Adds an emoji reaction from the caller (from a fixed palette). Idempotent per user+emoji. The updated message is re-broadcast to the conversation.",
        "operationId": "addReaction",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Message identifier",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ReactionRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "400": {
            "description": "Unsupported emoji or not a member",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "404": {
            "description": "Message not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "200": {
            "description": "Reaction added",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/MessageDto"
                }
              }
            }
          }
        }
      }
    },
    "/api/conversations": {
      "get": {
        "tags": [
          "Conversations"
        ],
        "summary": "List the caller's conversations",
        "description": "Returns every conversation the authenticated user is a member of, each enriched with its most recent message and the caller's unread count. Useful for rendering the conversation sidebar.",
        "operationId": "list_1",
        "responses": {
          "200": {
            "description": "Conversations returned",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ConversationDto"
                  }
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "Conversations"
        ],
        "summary": "Create a conversation",
        "description": "Creates a DIRECT (exactly two members) or GROUP conversation. The caller is added automatically; 'memberUsernames' lists the other participants. For DIRECT chats an existing conversation with the same pair may be reused.",
        "operationId": "create",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateConversationRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "404": {
            "description": "One or more member usernames do not exist",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "201": {
            "description": "Conversation created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ConversationDto"
                }
              }
            }
          },
          "400": {
            "description": "Invalid payload (e.g. empty members, bad type)",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      }
    },
    "/api/conversations/{id}/read": {
      "post": {
        "tags": [
          "Conversations"
        ],
        "summary": "Mark a conversation as read",
        "description": "Advances the caller's read marker to the supplied sequence number, clearing the unread count up to and including that message and triggering read receipts to other members. Returns 204 No Content on success.",
        "operationId": "markRead",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Conversation identifier",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/ReadRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "204": {
            "description": "Read marker updated"
          },
          "400": {
            "description": "Sequence must be zero or positive",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "403": {
            "description": "Caller is not a member of the conversation",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "404": {
            "description": "Conversation not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      }
    },
    "/api/conversations/{id}/members": {
      "get": {
        "tags": [
          "Conversations"
        ],
        "summary": "List a conversation's members",
        "description": "Returns every participant of the conversation together with their membership role (ADMIN or MEMBER). Useful for rendering a group roster showing the member count and who the admins are. Admins are returned first.",
        "operationId": "members",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Conversation identifier",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "403": {
            "description": "Caller is not a member of the conversation",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "200": {
            "description": "Members returned",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ConversationMemberDto"
                  }
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "404": {
            "description": "Conversation not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "Conversations"
        ],
        "summary": "Add members to a group",
        "description": "Adds one or more users (by username) to a GROUP conversation. Only group admins may add.",
        "operationId": "addMembers",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "description": "Conversation identifier",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/AddMembersRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "400": {
            "description": "Not a group or caller is not an admin",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "404": {
            "description": "A username does not exist",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "200": {
            "description": "Members added; updated roster returned",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ConversationMemberDto"
                  }
                }
              }
            }
          }
        }
      }
    },
    "/api/auth/register": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Register a new account",
        "description": "Creates a user with a unique username and returns a signed JWT together with the created profile. The returned token authorizes all subsequent REST calls and the WebSocket handshake. No authentication is required to call this endpoint.",
        "operationId": "register",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/RegisterRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "409": {
            "description": "Username already taken",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "201": {
            "description": "Account created; JWT issued",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthResponse"
                }
              }
            }
          },
          "400": {
            "description": "Validation failed (e.g. missing or too-short fields)",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        },
        "security": []
      }
    },
    "/api/auth/login": {
      "post": {
        "tags": [
          "Authentication"
        ],
        "summary": "Authenticate and obtain a JWT",
        "description": "Validates the supplied credentials and, on success, returns a signed JWT and the user profile. Use the token as 'Authorization: Bearer \u003Ctoken\u003E' for protected endpoints.",
        "operationId": "login",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/LoginRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "401": {
            "description": "Invalid username or password",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "400": {
            "description": "Missing username or password",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "200": {
            "description": "Credentials accepted; JWT issued",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AuthResponse"
                }
              }
            }
          }
        },
        "security": []
      }
    },
    "/api/admin/users": {
      "get": {
        "tags": [
          "Admin"
        ],
        "summary": "List all users",
        "description": "Returns a page of registered users with administrative details (role, active state, online status, conversation count). 'q' filters by username or display name; 'page' (0-based) and 'size' (max 100) control pagination.",
        "operationId": "list_2",
        "parameters": [
          {
            "name": "q",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "role",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "USER",
                "ADMIN"
              ]
            }
          },
          {
            "name": "active",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            }
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "size",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 20
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Users returned",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/PagedResponseAdminUserDto"
                }
              }
            }
          },
          "403": {
            "description": "Caller is not an administrator",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "401": {
            "description": "Missing or invalid JWT",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "Admin"
        ],
        "summary": "Create a user",
        "description": "Provisions a new account with the given username, display name, password and role. The username must be unique; the password is BCrypt-hashed and never returned.",
        "operationId": "create_1",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateUserRequest"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "description": "User created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AdminUserDto"
                }
              }
            }
          },
          "403": {
            "description": "Caller is not an administrator",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "400": {
            "description": "Validation error or username already taken",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      }
    },
    "/api/admin/users/{id}/revoke-sessions": {
      "post": {
        "tags": [
          "Admin"
        ],
        "summary": "Revoke a user's sessions (force logout)",
        "description": "Invalidates all of the user's outstanding JWTs by advancing their token version, forcing them to sign in again on every device.",
        "operationId": "revokeSessions",
        "parameters": [
          {
            "name": "id",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "404": {
            "description": "User not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          },
          "200": {
            "description": "Sessions revoked",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AdminUserDto"
                }
              }
            }
          },
          "403": {
            "description": "Caller is not an administrator",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ApiError"
                }
              }
            }
          }
        }
      }
    },
