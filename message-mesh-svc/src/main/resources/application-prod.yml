# Production profile: PostgreSQL, conservative DDL, secrets via environment.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/message_mesh_db}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:phanumantagoudra}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  h2:
    console:
      enabled: false

app:
  cors:
    # Production requires an explicit allow-list of trusted front-end origins.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://chat.example.com}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    auth:
      capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:10}
      refill-per-minute: ${APP_RATE_LIMIT_AUTH_REFILL:10}
    admin:
      capacity: ${APP_RATE_LIMIT_ADMIN_CAPACITY:120}
      refill-per-minute: ${APP_RATE_LIMIT_ADMIN_REFILL:120}

logging:
  level:
    root: WARN
    com.message.mesh: INFO

